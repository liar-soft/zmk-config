# 键盘基础设置
CONFIG_ZMK_KEYBOARD_NAME="Sofle"
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
# ZMK Studio 支持
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# 编码器配置（两个编码器）
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
# 左编码器
&left_encoder {
    status = "okay";
    resolution = <4>;
}
# 右编码器
&right_encoder {
    status = "okay";
    resolution = <4>;
}

# OLED 屏幕配置（你的细长屏幕）
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_I2C=y

# 电源管理（nice!nano 需要）
CONFIG_BATTERY_ENABLED=y
CONFIG_ZMK_BATTERY_REPORTING=y