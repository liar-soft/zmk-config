# 基础启用项
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PERIPHERAL=y

# 匹配你的 nice!nano v2 驱动版本
CONFIG_SOFTDEVICE_S140=y
CONFIG_SOFTDEVICE_S140_611=y  # 对应你的 S140 version 6.1.1

# OLED 显示屏配置（128x32 长条屏）
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_128X32=y   # 长条屏分辨率
CONFIG_ZMK_OLED=y
CONFIG_ZMK_OLED_FONT_MONO_5X8=y  # 适配窄屏的字体
CONFIG_ZMK_DISPLAY_STATUS_SCREEN=y  # 显示层/蓝牙/电池状态栏

# Bootloader 兼容（匹配你的 UF2 0.6.0）
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_ZMK_USB_CDC_ACM=y
CONFIG_TINYUSB=y