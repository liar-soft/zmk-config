# 替换原有 build.yml 内容，直接复制即可
name: Build ZMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ZMK v0.2 版本的正确BOARD名称：nice_nano_v2（带下划线）
        board: [nice_nano_v2]
        shield:
          - splitkb_aurora_sofle_left
          - splitkb_aurora_sofle_right

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            zmk/.west
            zmk/modules
          key: ${{ runner.os }}-west-${{ hashFiles('west.yml') }}
          restore-keys: |
            ${{ runner.os }}-west-

      - name: Install ZMK dependencies
        run: |
          sudo apt update && sudo apt install -y ninja-build gperf \
            python3-dev python3-pip python3-setuptools python3-wheel xz-utils file \
            make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          pip3 install west

      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build Firmware
        run: |
          west build -s zmk/app -d build/${{ matrix.shield }} \
            -b ${{ matrix.board }} \
            -DSHIELD=${{ matrix.shield }} \
            -DCONFIG_ZMK_STUDIO=y
        # 移除pillbug相关依赖，避免重复定义

      - name: Prepare Artifacts
        run: |
          mkdir -p firmware
          cp build/${{ matrix.shield }}/zephyr/zmk.uf2 firmware/${{ matrix.shield }}-${{ matrix.board }}.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/*.uf2