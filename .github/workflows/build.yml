name: Build ZMK Firmware

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    strategy:
      matrix:
        config:
          - { shield: splitkb_aurora_sofle_left, board: nice_nano_v2, snippet: studio-rpc-usb-uart }
          - { shield: splitkb_aurora_sofle_right, board: nice_nano_v2 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            .west
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ github.run_id }}-${{
            hashFiles('config/west.yml', 'config/**/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Initialize workspace (west init)
        run: |
          # 清理可能存在的旧配置
          rm -rf .west
          west init -l config

      - name: Update modules (west update)
        run: |
          west update

      - name: Export Zephyr CMake package
        run: |
          west zephyr-export

      - name: Build (${{ matrix.config.shield }})
        run: |
          west build -s zmk/app -d build/${{ matrix.config.shield }} \
            -b ${{ matrix.config.board }} \
            -- -DSHIELD=${{ matrix.config.shield }} \
            -DCONFIG_ZMK_STUDIO=y \
            ${{ matrix.config.snippet && format('-DSNIPPET={0}', matrix.config.snippet) || '' }}

      - name: Archive Firmware (${{ matrix.config.shield }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.shield }}
          path: build/${{ matrix.config.shield }}/zephyr/zmk.uf2
          retention-days: 30