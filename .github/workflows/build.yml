name: Build ZMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [nice_nano_v2]
        shield: [sofle_left, sofle_right]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install West
        run: pip3 install west==1.2.0

      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build Firmware
        run: |
          # ZMK v0.2 专用格式：-- 后传递编译参数，避免参数解析错误
          west build -s zmk/app -d build/${{ matrix.shield }} -b ${{ matrix.board }} -- -DSHIELD=${{ matrix.shield }} -DCONFIG_ZMK_STUDIO=y -DCONFIG_SOFTDEVICE_S140_611=y

      - name: Prepare Artifacts
        run: |
          mkdir -p firmware
          cp build/${{ matrix.shield }}/zephyr/zmk.uf2 firmware/sofle_${{ matrix.shield }}_nicenano_v2.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/*.uf2